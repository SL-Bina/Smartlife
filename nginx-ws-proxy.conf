# WebSocket proxy konfiqurasiyası — Soketi (port 8080)
#
# Bu bloku api.smartlife.az üçün olan Nginx server{} blokuna
# əlavə edin (mövcud location / blokdan ƏVVƏL).
#
# Tətbiq:
#   1. Bu bloku /etc/nginx/sites-available/api.smartlife.az faylına əlavə edin
#   2. sudo nginx -t
#   3. sudo systemctl reload nginx

# --- Aşağıdakını server { ... } blokuna əlavə edin ---

location /ws/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
    proxy_cache off;
}
